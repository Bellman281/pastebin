name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# Each service is built and tested independently in its own folder, so the two
# projects stay decoupled. (GitHub only reads workflow files from the repo root,
# so this single file is necessarily shared; everything else lives per-folder.)
# To drop a service, remove it from the matrix.
jobs:
  check:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [url-shortener, pastebin-service]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.service }}
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test
