<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
      .muted { fill: #94a3b8; }
    </style>
  </defs>

  <rect width="760" height="360" fill="#0f172a"/>
  <!-- browser window (dark) -->
  <rect x="24" y="20" width="712" height="320" rx="12" fill="#0b1220" stroke="#334155"/>
  <rect x="24" y="20" width="712" height="40" rx="12" fill="#111827"/>
  <rect x="24" y="48" width="712" height="12" fill="#111827"/>
  <circle cx="48" cy="40" r="6" fill="#ef6a5e"/><circle cx="68" cy="40" r="6" fill="#f5bf4f"/><circle cx="88" cy="40" r="6" fill="#61c554"/>
  <rect x="120" y="28" width="592" height="24" rx="12" fill="#0b1220" stroke="#334155"/>
  <text x="136" y="44" class="mono" fill="#94a3b8" font-size="11">https://paste.example/#QnsFVpLI.XkdybHPgx3Bq…</text>

  <text x="48" y="92" font-size="13" fill="#94a3b8">🔓 Decrypted locally in your browser — syntax highlighted (dark theme)</text>

  <!-- highlighted code block -->
  <rect x="48" y="104" width="664" height="200" rx="8" fill="#111827" stroke="#1f2937"/>
  <text x="68" y="132" class="mono" fill="#6a9955">// connect, query, and return the row count</text>
  <text x="68" y="156" class="mono"><tspan fill="#569cd6">let</tspan><tspan fill="#e5e7eb"> conn = </tspan><tspan fill="#e5e7eb">db.connect(</tspan><tspan fill="#ce9178">"sqlite://app.db"</tspan><tspan fill="#e5e7eb">)?;</tspan></text>
  <text x="68" y="180" class="mono"><tspan fill="#569cd6">let</tspan><tspan fill="#e5e7eb"> rows = conn.query(</tspan><tspan fill="#ce9178">"SELECT * FROM links"</tspan><tspan fill="#e5e7eb">)?;</tspan></text>
  <text x="68" y="204" class="mono"><tspan fill="#569cd6">for</tspan><tspan fill="#e5e7eb"> r </tspan><tspan fill="#569cd6">in</tspan><tspan fill="#e5e7eb"> rows { count += </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e5e7eb">; }</tspan></text>
  <text x="68" y="228" class="mono"><tspan fill="#569cd6">return</tspan><tspan fill="#e5e7eb"> count == </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e5e7eb"> ? </tspan><tspan fill="#ce9178">"empty"</tspan><tspan fill="#e5e7eb"> : </tspan><tspan fill="#ce9178">"ok"</tspan><tspan fill="#e5e7eb">;</tspan></text>
  <text x="68" y="266" class="mono" fill="#6a9955"># keywords, strings, numbers and comments are colored</text>

  <!-- legend -->
  <text x="48" y="328" font-size="11.5"><tspan fill="#569cd6">keyword</tspan><tspan fill="#94a3b8">  ·  </tspan><tspan fill="#ce9178">string</tspan><tspan fill="#94a3b8">  ·  </tspan><tspan fill="#b5cea8">number</tspan><tspan fill="#94a3b8">  ·  </tspan><tspan fill="#6a9955">comment</tspan></text>
</svg>
